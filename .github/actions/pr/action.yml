name: 'Create PR and send notification'
inputs:
  version:
    description: 'Publish version'
    required: true
  isPreRelease:
    default: true
    type: boolean
  chatAPI:
    description: 'Google chat API'
    required: true
  ref_name:
    description: 'Branch name'
    required: true
  threadKey:
    description: 'Google Chat thread key for grouping release notifications'
    required: false
    default: ''
  ballerina:
    description: 'Is Ballerina'
    type: boolean
    default: false
    required: true
  commonLibs:
    description: 'Is Common Lib'
    type: boolean
    default: false
    required: true

runs:
  using: "composite"
  steps:
      - name: Config git
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Ballerina git changes
        if: ${{ inputs.ballerina == 'true' }}
        shell: bash
        run: git add packages/*/package.json

      - name: Add common lib git changes
        if: ${{ inputs.commonLibs == 'true' }}
        shell: bash
        run: git add submodules/wso2-vscode-extensions/workspaces/common-libs/*/package.json

      - name: Commit version
        shell: bash
        id: commit
        run: |
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git diff --staged --quiet || git commit -m "Update version to ${{ inputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create tag
        shell: bash
        id: create_tag
        run: |
          git tag ${{ inputs.version }}
          git push origin "refs/tags/${{ inputs.version }}"

      - name: Create release branch
        shell: bash
        if: ${{ inputs.isPreRelease == 'false' }}
        id: create_branch
        run: |
          git checkout -b "${{ inputs.version }}"
          git push origin "refs/heads/${{ inputs.version }}"

      - name: Create Pull Request
        shell: bash
        if: ${{ inputs.isPreRelease == 'false' }}
        id: pr
        run: |
          baseBranch="stable/ballerina"
          pr=$(gh pr create -B "$baseBranch" -H "${{ inputs.version }}" --title "Merge \"${{ inputs.version }}\" into \"$baseBranch\"" --body '$subject')
          echo "prURL=$pr" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: "PR Notification"
        if: ${{ inputs.isPreRelease == 'false' }}
        shell: bash
        run: |
          THREAD_KEY="${{ inputs.threadKey }}"
          if [ -n "${THREAD_KEY}" ]; then
            THREAD_FIELD='"thread": {"threadKey": "'"${THREAD_KEY}"'"},'
            URL_SUFFIX="&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD"
          else
            THREAD_FIELD=""
            URL_SUFFIX=""
          fi
          body=$(cat << EOF
          {
            ${THREAD_FIELD}
            "cards": [
              {
                "header": {
                    "title": "New Release PR"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Pull Request",
                          "content": "${{ steps.pr.outputs.prURL }}",
                          "button": {
                            "textButton": {
                              "text": "Merge",
                              "onClick": {
                                "openLink": {
                                  "url": "${{ steps.pr.outputs.prURL }}"
                                }
                              }
                            }
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl \
            -X POST \
            -H 'Content-Type: application/json' \
            "${{ inputs.chatAPI }}${URL_SUFFIX}" \
            -d "$body"
