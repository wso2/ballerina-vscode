name: Run Ballerina LS tests
description: Sets up JDK, Gradle, and Ballerina, restores the dependency cache, and runs the language server gradle test suite. The repository must already be checked out.

inputs:
  cache-branch:
    description: Branch name used in the Ballerina dependency cache key
    required: true
  gradle-version:
    description: Version passed to gradle as -Pversion (omitted when empty)
    required: false
    default: ''
  package-user:
    description: User for maven.pkg.github.com authentication
    required: true
  package-pat:
    description: Token for maven.pkg.github.com authentication
    required: true

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: 'temurin'
        java-version: 21.0.3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

    - name: Set Up Ballerina
      uses: ballerina-platform/setup-ballerina@97fd67111e3c3ecdfafff96fc24d95ad909ab299 # v1.1.4
      with:
        version: 2201.13.4

    # The build resolves Ballerina packages into a build-owned home
    # (build/ballerina_dependencies/home) rather than ~/.ballerina, and the
    # cache key hashes the locked dependency project — so the cache is only
    # reused when its contents are exactly what the current lock file would
    # produce. No restore-keys on purpose: a fuzzy match would restore packages
    # from older dependency sets, and test-time resolution picks the newest
    # version in the cache — stale entries change test behaviour. When the key
    # misses, the resolveBallerinaDependencies task rebuilds the cache from
    # scratch.
    - name: Cache Ballerina dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: packages/ballerina-language-server/build/ballerina_dependencies
        key: ${{ runner.os }}-ballerina-${{ inputs.cache-branch }}-${{ hashFiles('packages/ballerina-language-server/build-config/ballerina_dependencies/**') }}

    - name: Test with Gradle
      shell: bash
      working-directory: packages/ballerina-language-server
      env:
        packageUser: ${{ inputs.package-user }}
        packagePAT: ${{ inputs.package-pat }}
        GRADLE_PROJECT_VERSION: ${{ inputs.gradle-version }}
      run: |
        if [ "$RUNNER_OS" = "Windows" ]; then
          GRADLE=./gradlew.bat
        else
          GRADLE=./gradlew
        fi
        if [ -n "$GRADLE_PROJECT_VERSION" ]; then
          "$GRADLE" -Pversion="$GRADLE_PROJECT_VERSION" test
        else
          "$GRADLE" test
        fi
