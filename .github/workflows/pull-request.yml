name: PR Build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# Reusable workflows inherit caller permissions. Granting packages: read
# here lets GITHUB_TOKEN authenticate to maven.pkg.github.com (the LS
# gradle build pulls org.ballerinalang.* artifacts from there).
permissions:
  contents: read
  packages: read

jobs:
  changes:
    name: Detect changes
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build }}
      ls: ${{ steps.filter.outputs.ls }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            build:
              - 'packages/**'
              - 'submodules/wso2-vscode-extensions/workspaces/common-libs/**'
              - 'common/**'
              - 'rush.json'
              - 'rush-config.json'
              - '.github/workflows/pull-request.yml'
              - '.github/workflows/build.yml'
              - '.github/actions/**'
            ls:
              - 'packages/ballerina-language-server/**'
              - '.github/workflows/build.yml'
              - '.github/actions/ls-test/action.yml'

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.build == 'true'
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      runOnAWS: ${{ contains(github.event.pull_request.labels.*.name, 'Runner/AWS') }}
      runBalE2ETests: ${{ contains(github.event.pull_request.labels.*.name, 'Checks/Run Ballerina UI Tests') || github.base_ref == 'stable/ballerina' }}
      runLSTests: ${{ contains(github.event.pull_request.labels.*.name, 'Checks/Run LS Tests') || needs.changes.outputs.ls == 'true' }}
