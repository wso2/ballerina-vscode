name: Daily Build

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Ballerina language server — multi-branch pack & test
  # ─────────────────────────────────────────────────────────────────────────
  ls-prepare-matrix:
    name: LS prepare matrix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ballerina-language-server
    outputs:
      targets: ${{ steps.resolve-targets.outputs.targets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target branches
        id: resolve-targets
        shell: bash
        run: |
          set -euo pipefail

          latest_branch=$(git ls-remote --heads origin | awk -F'/' '/refs\/heads\/1\.[0-9]+\.x$/ { print $NF }' | sort -V | tail -n 1)
          if [ -z "${latest_branch}" ]; then
            echo "Unable to find a branch matching 1.d.x on origin" >&2
            exit 1
          fi

          timestamp=$(date '+%Y%m%d-%H%M%S')
          targets='[]'

          for branch in main "${latest_branch}"; do
            git fetch --depth=1 origin "${branch}:refs/remotes/origin/${branch}"

            branch_version=$(git show "origin/${branch}:gradle.properties" | awk -F= '$1 == "version" { gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); gsub(/\r/, "", $2); print $2; exit }')
            if [ -z "${branch_version}" ]; then
              echo "Unable to resolve version from gradle.properties for ${branch}" >&2
              exit 1
            fi

            build_version="${branch_version}-${timestamp}"
            targets=$(jq -c \
              --arg branch "${branch}" \
              --arg version "${build_version}" \
              '. + [{branch: $branch, version: $version}]' <<< "${targets}")
          done

          echo "targets=${targets}" >> "${GITHUB_OUTPUT}"

  ls-ubuntu-pack:
    name: LS Ubuntu pack (${{ matrix.branch }})
    needs: ls-prepare-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: packages/ballerina-language-server
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.ls-prepare-matrix.outputs.targets) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21.0.3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.4
        with:
          version: 2201.13.3

      - name: Cache Ballerina dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.ballerina/repositories/
          key: ${{ runner.os }}-ballerina-${{ matrix.branch }}-${{ hashFiles('**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-ballerina-${{ matrix.branch }}-

      - name: Pack with Gradle
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -Pversion=${{ matrix.version }} pack -x check

      - name: Upload daily build jar
        uses: actions/upload-artifact@v7
        with:
          path: packages/ballerina-language-server/build/ballerina-language-server-${{ matrix.version }}.jar
          archive: false
          if-no-files-found: error

  ls-ubuntu-test:
    name: LS Ubuntu test (${{ matrix.branch }})
    needs:
      - ls-prepare-matrix
      - ls-ubuntu-pack
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: packages/ballerina-language-server
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.ls-prepare-matrix.outputs.targets) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21.0.3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.4
        with:
          version: 2201.13.1

      - name: Cache Ballerina dependencies
        uses: actions/cache@v4
        with:
          path: /home/runner/.ballerina/repositories/
          key: ${{ runner.os }}-ballerina-${{ matrix.branch }}-${{ hashFiles('**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-ballerina-${{ matrix.branch }}-

      - name: Test with Gradle
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew -Pversion=${{ matrix.version }} test

  ls-windows-build:
    name: LS Windows build (${{ matrix.branch }})
    needs: ls-prepare-matrix
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: packages/ballerina-language-server
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.ls-prepare-matrix.outputs.targets) }}
    steps:
      - name: Enable long paths for Git
        shell: bash
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21.0.3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.4
        with:
          version: 2201.13.3

      - name: Cache Ballerina dependencies
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\.ballerina\repositories\
          key: ${{ runner.os }}-ballerina-${{ matrix.branch }}-${{ hashFiles('**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-ballerina-${{ matrix.branch }}-

      - name: Build with Gradle
        shell: cmd
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew.bat build

  # ─────────────────────────────────────────────────────────────────────────
  # Ballerina VSCode extension — build VSIX + tests
  # ─────────────────────────────────────────────────────────────────────────
  Build:
    name: Extension build
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      ballerina: true
      runTests: true
      runBalE2ETests: true

  # ─────────────────────────────────────────────────────────────────────────
  # Notifications
  # ─────────────────────────────────────────────────────────────────────────
  NotifySuccess:
    name: Notify (success)
    needs: Build
    runs-on: ubuntu-latest
    steps:
      - name: Restore build
        uses: actions/download-artifact@v4
        with:
          name: ExtBuild
          path: ./

      - name: Set up workspace
        run: |
          unzip build.zip
          rm build.zip

      - name: Notification - Ballerina
        uses: ./.github/actions/dailyBuildNotification
        with:
          title: Ballerina
          fileName: ballerina
          chatAPI: ${{ secrets.BI_TEAM_CHAT_API }}

  NotifyFailure:
    name: Notify (failure)
    needs:
      - ls-ubuntu-pack
      - ls-ubuntu-test
      - ls-windows-build
      - Build
    if: ${{ always() && contains(needs.*.result, 'failure') && github.repository == 'wso2/ballerina-vscode' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Failure Notification"
        uses: ./.github/actions/failure-notification
        with:
          title: "Daily Build Failed"
          run_id: ${{ github.run_id }}
          chat_api: ${{ secrets.TOOLING_TEAM_CHAT_API }}
          repository: ${{ github.repository }}
