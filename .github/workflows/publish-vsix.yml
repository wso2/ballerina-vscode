name: Publish Extension

on:
  workflow_dispatch:
    inputs:
      isPreRelease:
        required: true
        type: boolean
        default: false
      vscode:
        description: Publish to VSCode marketplace
        type: boolean
        required: true
        default: false
      openVSX:
        description: Publish to OpenVSX marketplace
        type: boolean
        required: true
        default: false
      notify:
        description: Notify release on VSCode chat
        type: boolean
        required: true
        default: false
      workflowRunId:
        description: Run ID of the Release VSIX workflow that produced the VSIX artifact
        required: true

env:
  EXTENSION_NAME: ballerina
  REPO: wso2/ballerina-vscode

jobs:
  publish:
    name: Publish vsix to marketplaces
    permissions:
      contents: write
    runs-on: codebuild-ballerina-vscode-${{ github.run_id }}-${{ github.run_attempt }}
    env:
      THREAD_KEY: ballerina-release-${{ github.event.inputs.workflowRunId }}
    steps:
      - name: Download artifact
        id: download-artifact
        uses: dawidd6/action-download-artifact@268677152d06ba59fcec7a7f0b5d961b6ccd7e1e # v2
        with:
          run_id: ${{ github.event.inputs.workflowRunId }}
          name: VSIX

      - name: Unzip
        run: |
          unzip VSIX.zip
          rm VSIX.zip

      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20.x

      - run: |
          npm install -g vsce
          npm install -g ovsx

      - name: Get version
        id: vsix
        run: |
          file=$(ls ${EXTENSION_NAME}-[0-9]*.[0-9]*.[0-9]*.vsix)
          fileName=${file##*-}
          version=${fileName%.*}
          echo "vsixName=$file" >> $GITHUB_OUTPUT
          echo "version=$version" >> $GITHUB_OUTPUT
          if [ "${{ github.event.inputs.isPreRelease }}" == "true" ]; then
            echo "releaseMode=--pre-release" >> $GITHUB_OUTPUT
          else
            echo "releaseMode= " >> $GITHUB_OUTPUT
          fi

      - name: Publish to VSCode marketplace
        if: ${{ github.event.inputs.vscode == 'true' }}
        run: vsce publish -p ${{ secrets.VSCE_TOKEN }} --packagePath ${{ steps.vsix.outputs.vsixName }} ${{ steps.vsix.outputs.releaseMode }}

      - name: Publish to OpenVSX marketplace
        if: ${{ github.event.inputs.openVSX == 'true' }}
        run: ovsx publish -p ${{ secrets.OPENVSX_TOKEN }} --packagePath ${{ steps.vsix.outputs.vsixName }} ${{ steps.vsix.outputs.releaseMode }}

      - name: Promote draft release to published in ${{ env.REPO }}
        id: create_release
        if: ${{ github.event.inputs.isPreRelease == 'false' }}
        run: |
          id=`curl -X GET -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization:token ${{ github.token }}" \
          https://api.github.com/repos/${REPO}/releases/tags/v${{ steps.vsix.outputs.version }} \
           | jq -r .id` && \
           curl -X PATCH -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization:token ${{ github.token }}" \
            -d '{"draft":false,"prerelease":false}' \
            https://api.github.com/repos/${REPO}/releases/$id

          if [ $? -eq 0 ]; then
            echo "release_created=true" >> $GITHUB_OUTPUT
            echo "Release promoted for v${{ steps.vsix.outputs.version }}"
          else
            echo "release_created=false" >> $GITHUB_OUTPUT
            echo "Failed to promote release for v${{ steps.vsix.outputs.version }}"
            exit 1
          fi

      - name: Trigger external repo workflow for ballerina release
        if: ${{ github.event.inputs.isPreRelease == 'false' && steps.create_release.outputs.release_created == 'true' }}
        env:
          CLOUD_EDITOR_BUILDER_REPO: ${{ secrets.CLOUD_EDITOR_BUILDER_REPO }}
          CLOUD_EDITOR_BUILDER_REPO_TOKEN: ${{ secrets.CLOUD_EDITOR_BUILDER_REPO_TOKEN }}
        run: |
          if [ -z "$CLOUD_EDITOR_BUILDER_REPO" ]; then
            echo "CLOUD_EDITOR_BUILDER_REPO secret not set, skipping"
            exit 0
          fi
          echo "Triggering external repository workflow for ballerina v${{ steps.vsix.outputs.version }}"
          response=$(curl -s -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $CLOUD_EDITOR_BUILDER_REPO_TOKEN" \
            "https://api.github.com/repos/${CLOUD_EDITOR_BUILDER_REPO}/dispatches" \
            -d '{"event_type": "extension_published", "client_payload": {"extension": "'"${EXTENSION_NAME}"'", "version": "${{ steps.vsix.outputs.version }}", "release_url": "https://github.com/'"${REPO}"'/releases/tag/v${{ steps.vsix.outputs.version }}"}}')

          http_code=$(echo "$response" | tail -c 4)
          if [ "$http_code" -eq 204 ]; then
            echo "Triggered external repository workflow"
          else
            echo "Failed to trigger external repository workflow. HTTP code: $http_code"
            echo "Response: $response"
            exit 1
          fi

      - name: "Release Notification"
        if: ${{ github.event.inputs.notify == 'true' }}
        run: |
          body=$(cat << EOF
          {
            "thread": {"threadKey": "${THREAD_KEY}"},
            "cards": [
              {
                "header": {
                    "title": "Marketplace Release",
                    "subtitle": "Ballerina Extension"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "VSCode Marketplace",
                          "content": "v${{ steps.vsix.outputs.version }}",
                          "iconUrl": "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Visual_Studio_Code_1.35_icon.svg/512px-Visual_Studio_Code_1.35_icon.svg.png",
                          "button": {
                            "textButton": {
                              "text": "View",
                              "onClick": {
                                "openLink": {
                                  "url": "https://marketplace.visualstudio.com/items?itemName=WSO2.${EXTENSION_NAME}"
                                }
                              }
                            }
                          }
                        }
                      },
                      {
                        "keyValue": {
                          "topLabel": "OpenVSX Marketplace",
                          "content": "v${{ steps.vsix.outputs.version }}",
                          "iconUrl": "https://projects.eclipse.org/sites/default/files/open-vsx-logo-withouttext.png",
                          "button": {
                            "textButton": {
                              "text": "View",
                              "onClick": {
                                "openLink": {
                                  "url": "https://open-vsx.org/extension/wso2/${EXTENSION_NAME}"
                                }
                              }
                            }
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl \
            -X POST \
            -H 'Content-Type: application/json' \
            "${{ secrets.EDITOR_TEAM_CHAT_API }}&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD" \
            -d "$body"

  Notify:
    name: Notify (failure)
    needs: [publish]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.repository == 'wso2/ballerina-vscode' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: "Failure Notification"
        uses: ./.github/actions/failure-notification
        with:
          title: "Publish Extension Failed"
          run_id: ${{ github.run_id }}
          chat_api: ${{ secrets.EDITOR_TEAM_CHAT_API }}
          repository: ${{ github.repository }}
          thread_key: ballerina-release-${{ github.event.inputs.workflowRunId }}
