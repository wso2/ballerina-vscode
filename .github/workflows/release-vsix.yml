name: Release Extension

on:
  workflow_dispatch:
    inputs:
      isPreRelease:
        required: true
        type: boolean
        default: true
      lsSource:
        description: 'LS source: local builds the LS from source in this repo; download fetches it from a GitHub release tag'
        type: choice
        required: false
        default: 'local'
        options:
          - 'local'
          - 'download'
      ballerinaLsTag:
        description: 'Release tag to download the LS from (only used when lsSource=download; e.g. latest, prerelease, v1.5.0)'
        type: string
        required: false
        default: ''
      version:
        type: choice
        description: 'Enter the version type'
        required: true
        default: 'N/A'
        options:
          - 'patch'
          - 'minor'
          - 'major'
          - 'N/A'

jobs:
  Build:
    name: Build branch - ${{ github.ref_name }}
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      runOnAWS: true
      isPreRelease: ${{ inputs.isPreRelease }}
      lsSource: ${{ inputs.lsSource }}
      ballerinaLsTag: ${{ inputs.ballerinaLsTag }}
      enableCache: false
      ballerina: true
      version: ${{ inputs.version }}
      isReleaseBuild: true

  Release:
    name: Release VSIX
    needs: Build
    timeout-minutes: 45
    runs-on: codebuild-ballerina-vscode-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Restore build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ExtBuild
          path: ./

      - name: Set up workspace
        run: |
          unzip build.zip
          rm build.zip

      - name: Setup Rush
        uses: gigara/setup-rush@7ba3446572d15f5eacc85de383ad9679dfb7223c # v1.2.0
        with:
          pnpm: 10.11.0
          node: 22.x
          cache-rush: false
          cache-pnpm: false
          set-env: false
          rush-install: true

      - name: Get version
        id: vsix
        run: |
          file=$(ls ballerina-[0-9]*.[0-9]*.[0-9]*.vsix)
          vsixName=$(basename "$file" .vsix)
          numericVersion="${vsixName#ballerina-}"
          echo "version=$vsixName" >> $GITHUB_OUTPUT
          echo "numericVersion=$numericVersion" >> $GITHUB_OUTPUT

      - name: Initiate release thread
        run: |
          RELEASE_TYPE=${{ inputs.isPreRelease == true && '"Pre-release"' || '"Release"' }}
          body=$(cat << EOF
          {
            "thread": {"threadKey": "ballerina-release-${{ github.run_id }}"},
            "cards": [
              {
                "header": {
                  "title": "Ballerina v${{ steps.vsix.outputs.numericVersion }} $RELEASE_TYPE",
                  "subtitle": "${{ github.ref_name }} · triggered by ${{ github.actor }}"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Status",
                          "content": "Release workflow started",
                          "button": {
                            "textButton": {
                              "text": "View Workflow",
                              "onClick": {
                                "openLink": {
                                  "url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                                }
                              }
                            }
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST \
            -H 'Content-Type: application/json' \
            "${{ secrets.EDITOR_TEAM_CHAT_API }}&messageReplyOption=REPLY_MESSAGE_FALLBACK_TO_NEW_THREAD" \
            -d "$body"

      - name: Create a release in wso2/ballerina-vscode repo
        uses: ./.github/actions/release
        with:
          repo: wso2/ballerina-vscode
          name: ballerina
          token: ${{ secrets.CHOREO_BOT_TOKEN }}
          chatAPI: ${{ secrets.EDITOR_TEAM_CHAT_API }}
          threadKey: ballerina-release-${{ github.run_id }}

      - name: BI Team Release Announcement
        if: ${{ inputs.isPreRelease == false }}
        run: |
          body=$(cat << EOF
          {
            "cards": [
              {
                "header": {
                  "title": "Ballerina v${{ steps.vsix.outputs.numericVersion }} Released",
                  "subtitle": "VS Code Extension"
                },
                "sections": [
                  {
                    "widgets": [
                      {
                        "keyValue": {
                          "topLabel": "Release",
                          "content": "v${{ steps.vsix.outputs.numericVersion }}",
                          "button": {
                            "textButton": {
                              "text": "Download",
                              "onClick": {
                                "openLink": {
                                  "url": "https://github.com/${{ github.repository }}/releases/tag/v${{ steps.vsix.outputs.numericVersion }}"
                                }
                              }
                            }
                          }
                        }
                      }
                    ]
                  }
                ]
              }
            ]
          }
          EOF
          )
          curl -X POST \
            -H 'Content-Type: application/json' \
            "${{ secrets.BI_TEAM_CHAT_API }}" \
            -d "$body"

      - name: Create PR and notify
        uses: ./.github/actions/pr
        with:
          version: ${{ steps.vsix.outputs.version }}
          isPreRelease: ${{ github.event.inputs.isPreRelease }}
          bot_username: ${{ secrets.CHOREO_BOT_USERNAME }}
          bot_email: ${{ secrets.CHOREO_BOT_EMAIL }}
          bot_token: ${{ secrets.CHOREO_BOT_TOKEN }}
          ref_name: ${{ github.ref_name }}
          ballerina: true
          chatAPI: ${{ secrets.EDITOR_TEAM_CHAT_API }}
          threadKey: ballerina-release-${{ github.run_id }}

  Notify:
    needs: [Release]
    if: ${{ always() && contains(needs.*.result, 'failure') && github.repository == 'wso2/ballerina-vscode' }}
    runs-on: codebuild-ballerina-vscode-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: "Failure Notification"
        uses: ./.github/actions/failure-notification
        with:
          title: "Release Build Failed"
          run_id: ${{ github.run_id }}
          chat_api: ${{ secrets.EDITOR_TEAM_CHAT_API }}
          repository: ${{ github.repository }}
          thread_key: ballerina-release-${{ github.run_id }}
