name: Save build cache when PR merged

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  Build_Stage:
    name: Build repo
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ballerina-platform/setup-ballerina@v1
        name: Install Ballerina
        with:
          version: 2201.13.2

      - name: Setup Rush
        uses: gigara/setup-rush@v1.2.0
        with:
          pnpm: 10.11.0
          node: 22.x
          rush-install: true
          rush-build: true
          # Only pre-build the ballerina extension chain — building the LS
          # here would need GitHub Packages credentials.
          optional-build-args: --to ballerina --verbose
